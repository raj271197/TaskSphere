services:
  - type: web
    name: tasksphere
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.11.1
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: tasksphere
      - key: NEXT_PUBLIC_API_BASE_URL
        value: https://tasksphere.onrender.com
      - key: ENABLE_FILE_FALLBACK
        value: "false"
